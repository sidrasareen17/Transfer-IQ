function safe(v){ return (v === null || v === undefined || isNaN(v)) ? 0 : Number(v); }

            },

                scales:{y:{beginAtZero:true}}

                scales:{y:{beginAtZero:true, min:-1, max:1}}

<body>

<div class="container">

<h2>⚽ TransferIQ Dashboard - Random Forest & Analytics</h2>

<select id="playerSelect"></select>

<div class="cards">
    <div class="card">Market Value <p id="market"></p></div>
    <div class="card">Random Forest Prediction <p id="rf"></p></div>
</div>

<div class="chart-grid">
    <canvas id="marketChart"></canvas>
    <canvas id="rfChart"></canvas>
    <canvas id="performanceChart"></canvas>
    <canvas id="sentimentChart"></canvas>
</div>

</div>

<script>
let charts = {};

// Safe number function
function safe(v){ return (v===null || v===undefined || isNaN(v)) ? 0 : Number(v); }

// Load players
fetch("/players")
.then(r=>r.json())
.then(players=>{
    let sel = document.getElementById("playerSelect");
    sel.innerHTML = "<option value=''>Select Player</option>";
    players.forEach(p=>{
        let o = document.createElement("option");
        o.value = p;
        o.textContent = p;
        sel.appendChild(o);
    });
    sel.addEventListener("change", load);
})
.catch(err=>console.error("Player load error:", err));

// Load selected player data
function load(){
    let p = document.getElementById("playerSelect").value;
    if(!p) return;

    fetch("/player/" + encodeURIComponent(p))
    .then(r=>r.json())
    .then(data=>{
        if(!data || data.error){
            alert("No data found");
            return;
        }

        let l = data[data.length-1];

        function formatMoney(v){ return "€" + (safe(v)/1000000).toFixed(1) + "M"; }

        // Update cards
        document.getElementById("market").innerText = formatMoney(l.market_value_eur);
        document.getElementById("rf").innerText = formatMoney(l.rf_prediction);

        // Prepare data arrays
        let seasons = data.map(d=>d.season);
        let marketValues = data.map(d=>safe(d.market_value_eur));
        let rfValues = data.map(d=>safe(d.rf_prediction));
        let goals = data.map(d=>safe(d.goals_per90));
        let assists = data.map(d=>safe(d.assists_per90));
        let sentiment = data.map(d=>safe(d.vader_compound_score));

        // MARKET VALUE CHART
        if(charts.market) charts.market.destroy();
        charts.market = new Chart(document.getElementById("marketChart"), {
            type:"line",
            data:{labels:seasons,datasets:[{label:"Market Value", data:marketValues, borderColor:"cyan", tension:0.3}]},
            options:{scales:{y:{beginAtZero:false}}}
        });

        // RANDOM FOREST CHART
        if(charts.rf) charts.rf.destroy();
        charts.rf = new Chart(document.getElementById("rfChart"), {
            type:"line",
            data:{labels:seasons,datasets:[{label:"Random Forest Prediction", data:rfValues, borderColor:"orange", tension:0.3}]},
            options:{scales:{y:{beginAtZero:false}}}
        });

        // PERFORMANCE CHART (Goals & Assists)
        if(charts.performance) charts.performance.destroy();
        charts.performance = new Chart(document.getElementById("performanceChart"), {
            type:"line",
            data:{labels:seasons,datasets:[
                {label:"Goals per 90", data:goals, borderColor:"green", tension:0.3},
                {label:"Assists per 90", data:assists, borderColor:"blue", tension:0.3}
            ]},
            options:{scales:{y:{beginAtZero:true}}}
        });

        // SENTIMENT CHART
        if(charts.sentiment) charts.sentiment.destroy();
        charts.sentiment = new Chart(document.getElementById("sentimentChart"), {
            type:"bar",
            data:{labels:seasons,datasets:[{
                label:"Fan Sentiment",
                data:sentiment,
                backgroundColor: sentiment.map(v=>v>0?"green":"red")
            }]},
            options:{scales:{y:{beginAtZero:true, min:-1, max:1}}}
        });

    })
    .catch(err=>{console.error("Error loading player data:",err); alert("Error loading player data");});
}
</script>
